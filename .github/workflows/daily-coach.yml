name: Daily Fitness Coaching Brief

on:
  schedule:
    - cron: '0 11 * * *'   # 7:00 AM EST (EDT) / change to 0 12 for EST (Nov-Mar)
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

jobs:
  run-coach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore health history cache
        uses: actions/cache@v4
        with:
          path: data/history.json
          key: health-history-${{ github.run_id }}
          restore-keys: |
            health-history-

      - name: Run coaching pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_BASE64 }}
          GOOGLE_DRIVE_FOLDER_NAME: ${{ secrets.GOOGLE_DRIVE_FOLDER_NAME }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python main.py

      - name: Save updated health history cache
        uses: actions/cache@v4
        with:
          path: data/history.json
          key: health-history-${{ github.run_id }}
